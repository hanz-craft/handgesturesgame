<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🌈 Fun Hand Game</title>

    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3/drawing_utils.js" crossorigin="anonymous">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js" crossorigin="anonymous">
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Quicksand', 'Comic Sans MS', 'Segoe UI', sans-serif;
            background: #0b0e14;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
            touch-action: none;
        }
        #app {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        #webcam {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 0;
            filter: brightness(0.7) saturate(1.1) contrast(1.05);
        }
        #overlay-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        /* Answer circles */
        #answer-left,
        #answer-right {
            position: absolute;
            bottom: 10%;
            width: clamp(110px, 24vw, 200px);
            height: clamp(110px, 24vw, 200px);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2;
            pointer-events: none;
            font-weight: 800;
            text-align: center;
            padding: 8px;
            transition: transform 0.15s, box-shadow 0.25s, border-color 0.25s, background 0.25s;
            border: 6px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(2px);
            font-size: clamp(1rem, 2.2vw, 1.8rem);
            line-height: 1.3;
            color: #fff;
        }
        #answer-left {
            left: 5%;
            background: radial-gradient(ellipse at 30% 30%, rgba(0, 200, 255, 0.55), rgba(0, 80, 180, 0.7));
            border-color: rgba(0, 200, 255, 0.4);
        }
        #answer-right {
            right: 5%;
            background: radial-gradient(ellipse at 30% 30%, rgba(255, 80, 180, 0.55), rgba(180, 20, 120, 0.7));
            border-color: rgba(255, 80, 180, 0.4);
        }
        #answer-left .label,
        #answer-right .label {
            font-size: clamp(0.5rem, 0.8vw, 0.8rem);
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 2px;
        }
        #answer-left .emoji,
        #answer-right .emoji {
            font-size: clamp(1.8rem, 4vw, 3.2rem);
        }
        .glow {
            border-color: #7ee8fa !important;
            box-shadow: 0 0 50px rgba(0, 200, 255, 0.6), 0 8px 40px rgba(0, 0, 0, 0.4) !important;
            transform: scale(1.06);
        }
        #answer-right.glow {
            border-color: #ff8ec4 !important;
            box-shadow: 0 0 50px rgba(255, 80, 180, 0.6), 0 8px 40px rgba(0, 0, 0, 0.4) !important;
        }
        .correct {
            border-color: #2ecc71 !important;
            box-shadow: 0 0 70px rgba(46, 204, 113, 0.7), 0 8px 40px rgba(0, 0, 0, 0.4) !important;
            background: radial-gradient(ellipse at 30% 30%, rgba(46, 204, 113, 0.7), rgba(20, 120, 60, 0.8)) !important;
            transform: scale(1.10);
        }
        .wrong {
            border-color: #e74c3c !important;
            box-shadow: 0 0 70px rgba(231, 76, 60, 0.7), 0 8px 40px rgba(0, 0, 0, 0.4) !important;
            background: radial-gradient(ellipse at 30% 30%, rgba(231, 76, 60, 0.7), rgba(140, 20, 20, 0.8)) !important;
            transform: scale(0.92);
        }
        .disabled {
            opacity: 0.35;
            transform: scale(0.92);
            filter: grayscale(0.4);
            border-style: dashed !important;
        }

        /* HUD */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 16px 20px 20px;
        }
        #tab-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            padding: 6px 10px;
            background: rgba(10, 14, 23, 0.78);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 4px;
            flex-shrink: 0;
            width: 100%;
            max-width: 820px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            pointer-events: auto;
        }
        .tab-btn {
            padding: 4px 14px;
            border-radius: 40px;
            border: 2px solid transparent;
            font-size: clamp(0.7rem, 1.1vw, 1rem);
            font-weight: 700;
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            letter-spacing: 0.03em;
            display: flex;
            align-items: center;
            gap: 4px;
            pointer-events: auto;
        }
        .tab-btn:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }
        .tab-btn.active {
            background: rgba(126, 232, 250, 0.2);
            border-color: #7ee8fa;
            color: #7ee8fa;
            box-shadow: 0 0 20px rgba(126, 232, 250, 0.1);
        }
        #top-bar {
            width: 100%;
            max-width: 820px;
            padding: 14px 24px;
            background: rgba(10, 14, 23, 0.78);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
            margin-top: 6px;
            pointer-events: auto;
            text-align: center;
        }
        #question-text {
            font-size: clamp(1.2rem, 3vw, 2.4rem);
            font-weight: 700;
            color: #f0f4ff;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
            line-height: 1.3;
        }
        #bottom-bar {
            width: 100%;
            max-width: 820px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: rgba(10, 14, 23, 0.78);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
            flex-shrink: 0;
            margin-top: auto;
            margin-bottom: 10px;
            pointer-events: auto;
        }
        #score-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: clamp(0.9rem, 1.6vw, 1.4rem);
            font-weight: 600;
        }
        #score-icon {
            font-size: 1.4rem;
        }
        #score-value {
            color: #f7d44a;
            font-weight: 800;
            font-size: clamp(1.3rem, 2vw, 2rem);
            min-width: 36px;
            text-align: center;
            transition: transform 0.15s;
        }
        #score-value.pop {
            animation: score-pop 0.3s ease;
        }
        @keyframes score-pop {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.7);
                color: #ffd700;
            }
            100% {
                transform: scale(1);
            }
        }
        #progress {
            font-size: clamp(0.8rem, 1.2vw, 1.1rem);
            font-weight: 500;
            color: rgba(255, 255, 255, 0.5);
        }
        #progress strong {
            color: #fff;
            font-weight: 700;
        }

        #status-badge {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 4;
            padding: 10px 32px;
            border-radius: 60px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            font-size: clamp(0.9rem, 1.6vw, 1.4rem);
            font-weight: 700;
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.1);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s, transform 0.3s;
            text-align: center;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            max-width: 80vw;
        }
        #status-badge.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        #confetti-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: none;
        }
        #confetti-canvas.active {
            display: block;
        }

        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(14px);
            padding: 30px;
            pointer-events: auto;
        }
        #game-over.show {
            display: flex;
        }
        #game-over h1 {
            font-size: clamp(2.6rem, 6vw, 4.8rem);
            font-weight: 800;
            background: linear-gradient(135deg, #f7d44a, #ff8ec4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }
        #game-over .sub {
            font-size: clamp(1rem, 1.8vw, 1.6rem);
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 4px;
        }
        #game-over .final-score {
            font-size: clamp(2.8rem, 6vw, 5rem);
            font-weight: 800;
            color: #f7d44a;
            margin: 4px 0 14px;
        }
        #game-over .stats {
            font-size: clamp(0.9rem, 1.4vw, 1.2rem);
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 20px;
        }
        #restart-btn {
            padding: 14px 48px;
            font-size: clamp(1rem, 1.6vw, 1.4rem);
            font-weight: 700;
            border: none;
            border-radius: 60px;
            background: linear-gradient(135deg, #7ee8fa, #4a9eff);
            color: #fff;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(74, 158, 255, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: inherit;
            pointer-events: auto;
        }
        #restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 40px rgba(74, 158, 255, 0.5);
        }
        #restart-btn:active {
            transform: scale(0.94);
        }

        #camera-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 30;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(14px);
            padding: 30px;
            text-align: center;
            transition: opacity 0.6s ease;
            pointer-events: auto;
        }
        #camera-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #camera-overlay .icon {
            font-size: 4rem;
            margin-bottom: 12px;
            display: block;
        }
        #camera-overlay h2 {
            font-size: clamp(1.4rem, 3vw, 2.4rem);
            color: #fff;
            margin-bottom: 8px;
            font-weight: 800;
        }
        #camera-overlay p {
            font-size: clamp(0.9rem, 1.4vw, 1.2rem);
            color: rgba(255, 255, 255, 0.7);
            max-width: 480px;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        #camera-overlay .btn-start {
            padding: 16px 48px;
            font-size: clamp(1.1rem, 1.6vw, 1.4rem);
            font-weight: 700;
            border: none;
            border-radius: 60px;
            background: linear-gradient(135deg, #7ee8fa, #4a9eff);
            color: #fff;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(74, 158, 255, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }
        #camera-overlay .btn-start:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 40px rgba(74, 158, 255, 0.5);
        }
        #camera-overlay .btn-start:active {
            transform: scale(0.94);
        }

        @media (max-width: 700px) {
            #top-bar {
                padding: 10px 14px;
                border-radius: 14px;
            }
            #bottom-bar {
                padding: 8px 14px;
                border-radius: 12px;
            }
            #answer-left,
            #answer-right {
                bottom: 8%;
                width: clamp(90px, 24vw, 150px);
                height: clamp(90px, 24vw, 150px);
                font-size: clamp(0.8rem, 2vw, 1.2rem);
                border-width: 4px;
            }
            #answer-left .emoji,
            #answer-right .emoji {
                font-size: clamp(1.4rem, 3.6vw, 2.4rem);
            }
            #status-badge {
                font-size: clamp(0.7rem, 1.4vw, 1rem);
                padding: 8px 20px;
            }
        }
        @media (max-width: 450px) {
            #top-bar {
                padding: 6px 10px;
                border-radius: 10px;
            }
            #answer-left,
            #answer-right {
                bottom: 6%;
                width: clamp(70px, 22vw, 110px);
                height: clamp(70px, 22vw, 110px);
                font-size: clamp(0.6rem, 1.6vw, 0.9rem);
                border-width: 3px;
                padding: 4px;
            }
            #answer-left .emoji,
            #answer-right .emoji {
                font-size: clamp(1rem, 3vw, 1.8rem);
            }
            #answer-left .label,
            #answer-right .label {
                font-size: 0.4rem;
            }
            #bottom-bar {
                padding: 6px 10px;
                border-radius: 10px;
            }
            #score-value {
                font-size: 1.2rem;
                min-width: 28px;
            }
            #question-text {
                font-size: 0.9rem;
            }
            #status-badge {
                font-size: 0.65rem;
                padding: 6px 14px;
                top: 55%;
            }
            #game-over h1 {
                font-size: 2rem;
            }
            #game-over .final-score {
                font-size: 2.4rem;
            }
            .tab-btn {
                padding: 2px 8px;
                font-size: 0.6rem;
            }
            .tab-btn .emoji-tab {
                font-size: 0.8rem;
            }
            #tab-bar {
                gap: 3px;
                padding: 3px 6px;
            }
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="app">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="overlay-canvas"></canvas>

        <div id="answer-left" data-side="left">
            <span class="emoji">🥕</span>
            <span class="answer-text">Carrot</span>
            <span class="label">⬅ left</span>
        </div>
        <div id="answer-right" data-side="right">
            <span class="emoji">🍌</span>
            <span class="answer-text">Banana</span>
            <span class="label">right ➡</span>
        </div>

        <div id="hud">
            <div id="tab-bar">
                <button class="tab-btn active" data-topic="foods"><span class="emoji-tab">🍎</span> Foods</button>
                <button class="tab-btn" data-topic="fruits"><span class="emoji-tab">🍉</span> Fruits</button>
                <button class="tab-btn" data-topic="shapes"><span class="emoji-tab">🔺</span> Shapes</button>
                <button class="tab-btn" data-topic="colors"><span class="emoji-tab">🎨</span> Colors</button>
                <button class="tab-btn" data-topic="mixed"><span class="emoji-tab">🌈</span> All</button>
            </div>
            <div id="top-bar">
                <div id="question-text">🎯 Wave your hand to answer!</div>
            </div>
            <div id="bottom-bar">
                <div id="score-wrap">
                    <span id="score-icon">⭐</span>
                    <span>Score:</span>
                    <span id="score-value">0</span>
                </div>
                <div id="progress">Q <strong id="q-num">0</strong> / <strong id="q-total">10</strong></div>
            </div>
        </div>

        <div id="status-badge"><span class="emoji">✋</span> Wave your hand left or right!</div>
        <canvas id="confetti-canvas"></canvas>

        <div id="game-over">
            <h1>🎉 All done!</h1>
            <div class="sub">You're a superstar! ⭐</div>
            <div class="final-score" id="final-score">0</div>
            <div class="stats" id="final-stats">✅ Correct: 0 &nbsp;·&nbsp; ❌ Oops: 0</div>
            <button id="restart-btn">🔄 Play Again</button>
        </div>

        <div id="camera-overlay">
            <span class="icon">📷</span>
            <h2>Camera Access Required</h2>
            <p>Wave your left or right hand to answer! Please allow camera access when prompted.</p>
            <button class="btn-start" id="camera-start-btn">📸 Start Game</button>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════
        //  QUESTIONS (kindergarten friendly)
        // ═══════════════════════════════════════════════════════════════
        const TOPICS = {
            foods: {
                label: '🍎 Foods',
                questions: [
                    { q: '🍎 Which one is a fruit?', left: '🥕 Carrot', right: '🍌 Banana', correct: 'right' },
                    { q: '🥦 Which one is a vegetable?', left: '🥦 Broccoli', right: '🍕 Pizza', correct: 'left' },
                    { q: '🥛 Which drink is healthy?', left: '🥛 Milk', right: '🥤 Soda', correct: 'left' },
                    { q: '🍟 Which one is a healthy snack?', left: '🥄 Yogurt', right: '🍟 Fries', correct: 'left' },
                    { q: '🌿 Which one is a green vegetable?', left: '🌿 Spinach', right: '🍝 Pasta', correct: 'left' },
                    { q: '🍓 Which one is sweet?', left: '🍓 Strawberry', right: '🍋 Lemon', correct: 'left' },
                    { q: '🐄 What do cows give us?', left: '🥛 Milk', right: '🥚 Eggs', correct: 'left' },
                    { q: '🍗 Which one is a protein?', left: '🍗 Chicken', right: '🍬 Candy', correct: 'left' },
                    { q: '🌳 Which one grows on a tree?', left: '🍊 Orange', right: '🍞 Bread', correct: 'left' },
                    { q: '🍋 What color is a banana?', left: '🟡 Yellow', right: '🔴 Red', correct: 'left' },
                ]
            },
            fruits: {
                label: '🍉 Fruits',
                questions: [
                    { q: '🍎 What fruit is this?', left: '🍎 Apple', right: '🍌 Banana', correct: 'left' },
                    { q: '🍌 What fruit is this?', left: '🍎 Apple', right: '🍌 Banana', correct: 'right' },
                    { q: '🍊 What fruit is this?', left: '🍊 Orange', right: '🍇 Grape', correct: 'left' },
                    { q: '🍇 What fruit is this?', left: '🍊 Orange', right: '🍇 Grape', correct: 'right' },
                    { q: '🍓 What fruit is this?', left: '🍓 Strawberry', right: '🫐 Blueberry', correct: 'left' },
                    { q: '🍉 What fruit is this?', left: '🍉 Watermelon', right: '🍈 Melon', correct: 'left' },
                    { q: '🍑 What fruit is this?', left: '🍑 Peach', right: '🍐 Pear', correct: 'left' },
                    { q: '🍍 What fruit is this?', left: '🍍 Pineapple', right: '🥝 Kiwi', correct: 'left' },
                    { q: '🥝 What fruit is this?', left: '🍍 Pineapple', right: '🥝 Kiwi', correct: 'right' },
                    { q: '🍒 What fruit is this?', left: '🍒 Cherry', right: '🍑 Peach', correct: 'left' },
                ]
            },
            shapes: {
                label: '🔺 Shapes',
                questions: [
                    { q: '🔺 What shape is this?', left: '🔺 Triangle', right: '⬛ Square', correct: 'left' },
                    { q: '⬛ What shape is this?', left: '🔺 Triangle', right: '⬛ Square', correct: 'right' },
                    { q: '🔵 What shape is this?', left: '🔵 Circle', right: '🟥 Rectangle', correct: 'left' },
                    { q: '🟥 What shape is this?', left: '🔵 Circle', right: '🟥 Rectangle', correct: 'right' },
                    { q: '⭐ What shape is this?', left: '⭐ Star', right: '🔵 Circle', correct: 'left' },
                    { q: '❤️ What shape is this?', left: '❤️ Heart', right: '⬛ Square', correct: 'left' },
                    { q: '💎 What shape is this?', left: '💎 Diamond', right: '🔺 Triangle', correct: 'left' },
                    { q: '🌙 What shape is this?', left: '🌙 Crescent', right: '🔵 Circle', correct: 'left' },
                    { q: '⬜ What shape is this?', left: '⬜ Rectangle', right: '⬛ Square', correct: 'left' },
                    { q: '🔺 How many sides?', left: '3', right: '4', correct: 'left' },
                ]
            },
            colors: {
                label: '🎨 Colors',
                questions: [
                    { q: '🔴 What color is this?', left: '🔴 Red', right: '🟡 Yellow', correct: 'left' },
                    { q: '🔵 What color is this?', left: '🔵 Blue', right: '🟢 Green', correct: 'left' },
                    { q: '🟢 What color is this?', left: '🔴 Red', right: '🟢 Green', correct: 'right' },
                    { q: '🟡 What color is this?', left: '🟡 Yellow', right: '🔵 Blue', correct: 'left' },
                    { q: '🟣 What color is this?', left: '🟣 Purple', right: '🟧 Orange', correct: 'left' },
                    { q: '🟧 What color is this?', left: '🟣 Purple', right: '🟧 Orange', correct: 'right' },
                    { q: '⚪ What color is this?', left: '⚪ White', right: '⚫ Black', correct: 'left' },
                    { q: '⚫ What color is this?', left: '⚪ White', right: '⚫ Black', correct: 'right' },
                    { q: '🟤 What color is this?', left: '🟤 Brown', right: '🩷 Pink', correct: 'left' },
                    { q: '🩷 What color is this?', left: '🟤 Brown', right: '🩷 Pink', correct: 'right' },
                ]
            },
            mixed: {
                label: '🌈 All',
                questions: [
                    { q: '🍎 Which one is a fruit?', left: '🥕 Carrot', right: '🍌 Banana', correct: 'right' },
                    { q: '🥦 Which one is a vegetable?', left: '🥦 Broccoli', right: '🍕 Pizza', correct: 'left' },
                    { q: '🍎 What fruit is this?', left: '🍎 Apple', right: '🍌 Banana', correct: 'left' },
                    { q: '🍌 What fruit is this?', left: '🍎 Apple', right: '🍌 Banana', correct: 'right' },
                    { q: '🔺 What shape is this?', left: '🔺 Triangle', right: '⬛ Square', correct: 'left' },
                    { q: '🔵 What shape is this?', left: '🔵 Circle', right: '🟥 Rectangle', correct: 'left' },
                    { q: '🔴 What color is this?', left: '🔴 Red', right: '🟡 Yellow', correct: 'left' },
                    { q: '🔵 What color is this?', left: '🔵 Blue', right: '🟢 Green', correct: 'left' },
                    { q: '🟢 What color is this?', left: '🔴 Red', right: '🟢 Green', correct: 'right' },
                    { q: '🥛 Which drink is healthy?', left: '🥛 Milk', right: '🥤 Soda', correct: 'left' },
                ]
            }
        };

        // ═══════════════════════════════════════════════════════════════
        //  GAME STATE (no timer)
        // ═══════════════════════════════════════════════════════════════
        const STATE = {
            WAITING: 'waiting',
            COUNTDOWN: 'countdown', // kept for compatibility but no timer
            ANSWERED: 'answered',
            GAME_OVER: 'game_over'
        };

        const game = {
            currentTopic: 'foods',
            questions: [],
            currentIndex: 0,
            score: 0,
            correctCount: 0,
            wrongCount: 0,
            state: STATE.WAITING,
            cooldown: false,
            handActive: false,
            selectedSide: null,
            totalQuestions: 10,
            isProcessing: false,
        };

        // DOM refs
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay-canvas');
        const ctx = canvas.getContext('2d');
        const questionEl = document.getElementById('question-text');
        const leftCircle = document.getElementById('answer-left');
        const rightCircle = document.getElementById('answer-right');
        const scoreEl = document.getElementById('score-value');
        const qNumEl = document.getElementById('q-num');
        const qTotalEl = document.getElementById('q-total');
        const statusBadge = document.getElementById('status-badge');
        const confettiCanvas = document.getElementById('confetti-canvas');
        const gameOverEl = document.getElementById('game-over');
        const finalScoreEl = document.getElementById('final-score');
        const finalStatsEl = document.getElementById('final-stats');
        const restartBtn = document.getElementById('restart-btn');
        const cameraOverlay = document.getElementById('camera-overlay');
        const cameraStartBtn = document.getElementById('camera-start-btn');
        const tabBtns = document.querySelectorAll('.tab-btn');

        // ═══════════════════════════════════════════════════════════════
        //  SOUND
        // ═══════════════════════════════════════════════════════════════
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new(window.AudioContext || window.webkitAudioContext)();
        }

        function playTone(freq, duration, type = 'sine', vol = 0.2) {
            try {
                initAudio();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch (_) {}
        }

        function soundCorrect() {
            playTone(523, 0.12, 'sine', 0.2);
            setTimeout(() => playTone(659, 0.12, 'sine', 0.2), 100);
            setTimeout(() => playTone(784, 0.18, 'sine', 0.22), 200);
        }

        function soundWrong() {
            playTone(300, 0.25, 'sawtooth', 0.12);
            setTimeout(() => playTone(200, 0.3, 'sawtooth', 0.10), 120);
        }

        function soundGameOver() {
            [523, 587, 659, 784].forEach((f, i) => {
                setTimeout(() => playTone(f, 0.16, 'sine', 0.14), i * 120);
            });
        }

        function soundSelect() { playTone(440, 0.05, 'sine', 0.07); }

        // ═══════════════════════════════════════════════════════════════
        //  CONFETTI
        // ═══════════════════════════════════════════════════════════════
        let confettiPieces = [];
        let confettiAnimId = null;
        let confettiRunning = false;

        function initConfettiCanvas() {
            const c = confettiCanvas;
            c.width = window.innerWidth;
            c.height = window.innerHeight;
            c.style.display = 'block';
            c.classList.add('active');
        }

        function resizeConfetti() {
            const c = confettiCanvas;
            c.width = window.innerWidth;
            c.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeConfetti);

        function launchConfetti(count = 160) {
            initConfettiCanvas();
            const c = confettiCanvas;
            const cx = c.getContext('2d');
            const w = c.width,
                h = c.height;
            const colors = ['#f7d44a', '#ff8ec4', '#7ee8fa', '#4a9eff', '#2ecc71', '#ff6b6b', '#a29bfe', '#fd79a8', '#00b894',
                '#fdcb6e'
            ];
            for (let i = 0; i < count; i++) {
                confettiPieces.push({
                    x: w / 2 + (Math.random() - 0.5) * 260,
                    y: h / 2 - 80 + (Math.random() - 0.5) * 100,
                    w: 6 + Math.random() * 10,
                    h: 3 + Math.random() * 6,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    vx: (Math.random() - 0.5) * 14,
                    vy: -6 - Math.random() * 10,
                    rot: Math.random() * 6.28,
                    rotSpeed: (Math.random() - 0.5) * 0.2,
                    gravity: 0.12 + Math.random() * 0.08,
                    life: 1,
                    decay: 0.006 + Math.random() * 0.007,
                });
            }
            if (confettiRunning) return;
            confettiRunning = true;
            confettiAnimId = requestAnimationFrame(renderConfetti);
        }

        function renderConfetti() {
            const c = confettiCanvas;
            const cx = c.getContext('2d');
            const w = c.width,
                h = c.height;
            cx.clearRect(0, 0, w, h);
            let alive = false;
            for (const p of confettiPieces) {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += p.gravity;
                p.rot += p.rotSpeed;
                p.life -= p.decay;
                if (p.life <= 0) continue;
                alive = true;
                cx.save();
                cx.translate(p.x, p.y);
                cx.rotate(p.rot);
                cx.globalAlpha = Math.max(0, p.life);
                cx.fillStyle = p.color;
                cx.shadowColor = p.color;
                cx.shadowBlur = 6;
                cx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                cx.restore();
            }
            if (alive) {
                confettiAnimId = requestAnimationFrame(renderConfetti);
            } else {
                confettiRunning = false;
                confettiPieces = [];
                c.style.display = 'none';
                c.classList.remove('active');
                if (confettiAnimId) {
                    cancelAnimationFrame(confettiAnimId);
                    confettiAnimId = null;
                }
            }
        }

        function stopConfetti() {
            confettiPieces = [];
            if (confettiAnimId) {
                cancelAnimationFrame(confettiAnimId);
                confettiAnimId = null;
            }
            confettiRunning = false;
            confettiCanvas.style.display = 'none';
            confettiCanvas.classList.remove('active');
        }

        // ═══════════════════════════════════════════════════════════════
        //  CANVAS RESIZE (just for drawing hand indicators, but not used heavily)
        // ═══════════════════════════════════════════════════════════════
        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }
        window.addEventListener('resize', resizeCanvas);

        // ═══════════════════════════════════════════════════════════════
        //  GAME LOGIC (no timer)
        // ═══════════════════════════════════════════════════════════════
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function initGame(topicKey = 'foods') {
            stopConfetti();
            gameOverEl.classList.remove('show');
            gameOverEl.style.display = 'none';

            game.currentTopic = topicKey;
            const topicQuestions = TOPICS[topicKey] ? TOPICS[topicKey].questions : TOPICS.foods.questions;
            const shuffled = shuffleArray([...topicQuestions]);
            game.questions = shuffled.slice(0, Math.min(10, shuffled.length));
            game.currentIndex = 0;
            game.score = 0;
            game.correctCount = 0;
            game.wrongCount = 0;
            game.state = STATE.WAITING;
            game.cooldown = false;
            game.handActive = false;
            game.selectedSide = null;
            game.isProcessing = false;

            qTotalEl.textContent = game.questions.length;
            game.totalQuestions = game.questions.length;
            updateScore();
            showQuestion();
            setStatus('✋ Wave your hand left or right!', true);

            tabBtns.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.topic === topicKey);
            });
        }

        function showQuestion() {
            if (game.currentIndex >= game.questions.length) {
                endGame();
                return;
            }
            const q = game.questions[game.currentIndex];
            questionEl.textContent = q.q;
            leftCircle.querySelector('.answer-text').textContent = q.left;
            rightCircle.querySelector('.answer-text').textContent = q.right;

            // Update emojis
            const leftEmoji = q.left.match(/^([\u{1F300}-\u{1FAFF}]|[\u2600-\u27BF]|[\u{1F600}-\u{1F64F}]|[\u{1F680}-\u{1F6FF}]|[✅⭐🌈🔴🟢🔵🟡🟣🟧⬛⬜🟤🩷❤️💎🌙])/u);
            const rightEmoji = q.right.match(/^([\u{1F300}-\u{1FAFF}]|[\u2600-\u27BF]|[\u{1F600}-\u{1F64F}]|[\u{1F680}-\u{1F6FF}]|[✅⭐🌈🔴🟢🔵🟡🟣🟧⬛⬜🟤🩷❤️💎🌙])/u);
            if (leftEmoji) leftCircle.querySelector('.emoji').textContent = leftEmoji[1];
            else leftCircle.querySelector('.emoji').textContent = '🔵';
            if (rightEmoji) rightCircle.querySelector('.emoji').textContent = rightEmoji[1];
            else rightCircle.querySelector('.emoji').textContent = '🔵';

            qNumEl.textContent = game.currentIndex + 1;
            leftCircle.className = 'answer-circle';
            rightCircle.className = 'answer-circle';
            game.state = STATE.WAITING;
            game.cooldown = false;
            game.handActive = false;
            game.selectedSide = null;
            game.isProcessing = false;
            setStatus('✋ Wave your hand left or right!', true);
        }

        // No timer - just wait for hand wave
        function startCountdown() {
            // Immediately set to COUNTDOWN so hand detection works
            if (game.state === STATE.WAITING) {
                game.state = STATE.COUNTDOWN;
                setStatus('✋ Wave your hand now!', true);
            }
        }

        function selectAnswer(side) {
            if (game.cooldown || game.isProcessing) return;
            if (game.currentIndex >= game.questions.length) return;
            const q = game.questions[game.currentIndex];
            const isCorrect = (side === q.correct);

            game.state = STATE.ANSWERED;
            game.cooldown = true;
            game.isProcessing = true;
            game.selectedSide = side;

            const el = side === 'left' ? leftCircle : rightCircle;
            const other = side === 'left' ? rightCircle : leftCircle;

            if (isCorrect) {
                el.classList.add('correct');
                other.classList.add('disabled');
                game.score++;
                game.correctCount++;
                updateScore(true);
                soundCorrect();
                launchConfetti(140);
                setStatus('✅ Correct! 🎉', true);
            } else {
                el.classList.add('wrong');
                const correctEl = q.correct === 'left' ? leftCircle : rightCircle;
                correctEl.classList.add('correct');
                other.classList.add('disabled');
                game.wrongCount++;
                soundWrong();
                const ans = q.correct === 'left' ? q.left : q.right;
                setStatus('😅 Oops! The answer was ' + ans, true);
            }

            setTimeout(() => {
                game.isProcessing = false;
                nextQuestion();
            }, 1400);
        }

        function nextQuestion() {
            game.cooldown = false;
            game.currentIndex++;
            if (game.currentIndex >= game.questions.length) {
                endGame();
            } else {
                showQuestion();
                // Auto-start next question
                setTimeout(() => {
                    if (game.state === STATE.WAITING) {
                        game.state = STATE.COUNTDOWN;
                        setStatus('✋ Wave your hand now!', true);
                    }
                }, 400);
            }
        }

        function endGame() {
            game.state = STATE.GAME_OVER;
            stopConfetti();
            setStatus('🏁 You finished! Great job! ⭐', true);
            finalScoreEl.textContent = game.score;
            finalStatsEl.textContent = `✅ Correct: ${game.correctCount}  ·  ❌ Oops: ${game.wrongCount}`;
            gameOverEl.style.display = 'flex';
            setTimeout(() => gameOverEl.classList.add('show'), 50);
            soundGameOver();
            launchConfetti(200);
        }

        function updateScore(pop = false) {
            scoreEl.textContent = game.score;
            if (pop) {
                scoreEl.classList.remove('pop');
                void scoreEl.offsetWidth;
                scoreEl.classList.add('pop');
            }
        }

        function setStatus(msg, show = true) {
            const badge = statusBadge;
            if (show) {
                badge.innerHTML = msg;
                badge.classList.add('show');
            } else {
                badge.classList.remove('show');
            }
        }

        // ═══════════════════════════════════════════════════════════════
        //  TAB SWITCHING
        // ═══════════════════════════════════════════════════════════════
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const topic = btn.dataset.topic;
                if (topic === game.currentTopic && game.questions.length > 0 && game.state !== STATE.GAME_OVER)
                    return;
                initGame(topic);
                setTimeout(() => {
                    if (game.state === STATE.WAITING) {
                        game.state = STATE.COUNTDOWN;
                        setStatus('✋ Wave your hand now!', true);
                    }
                }, 400);
            });
        });

        // ═══════════════════════════════════════════════════════════════
        //  MEDIAPIPE HANDS - SIMPLE AND RELIABLE
        // ═══════════════════════════════════════════════════════════════
        let handDetectionReady = false;
        let handRaisedStartTime = 0;
        const RAISE_THRESHOLD = 0.02;
        const RAISE_DEBOUNCE_MS = 200;

        // Smoothing for hand position
        let smoothX = 0.5;
        let smoothY = 0.5;
        const SMOOTH_FACTOR = 0.3;

        // Circle helpers
        function getCircleCenter(side) {
            const el = side === 'left' ? leftCircle : rightCircle;
            const rect = el.getBoundingClientRect();
            return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
        }

        function getCircleRadius() {
            const rect = leftCircle.getBoundingClientRect();
            return rect.width / 2 * 0.9;
        }

        function isHandNearCircle(handX, handY, side) {
            const center = getCircleCenter(side);
            const radius = getCircleRadius();
            const dx = handX - center.x;
            const dy = handY - center.y;
            return (dx * dx + dy * dy) < (radius * radius);
        }

        function onHandResults(results) {
            const w = canvas.width,
                h = canvas.height;
            ctx.clearRect(0, 0, w, h);

            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                handRaisedStartTime = 0;
                if (game.state === STATE.COUNTDOWN || game.state === STATE.WAITING) {
                    leftCircle.classList.remove('glow');
                    rightCircle.classList.remove('glow');
                }
                game.handActive = false;
                return;
            }

            // We'll use the first hand detected
            const landmarks = results.multiHandLandmarks[0];
            const wrist = landmarks[0];
            const indexTip = landmarks[8];
            const imageWidth = video.videoWidth || 640;
            const imageHeight = video.videoHeight || 480;

            // Mirror x for display
            const rawX = imageWidth - indexTip.x * imageWidth;
            const rawY = indexTip.y * imageHeight;

            // Smooth position
            smoothX = smoothX * (1 - SMOOTH_FACTOR) + rawX * SMOOTH_FACTOR;
            smoothY = smoothY * (1 - SMOOTH_FACTOR) + rawY * SMOOTH_FACTOR;

            const handX = smoothX;
            const handY = smoothY;

            // Determine side based on hand position relative to screen center
            const half = imageWidth / 2;
            const side = handX < half ? 'left' : 'right';

            // Check if hand is raised (index tip above wrist)
            const raised = indexTip.y < wrist.y - RAISE_THRESHOLD;

            // Draw a simple indicator on canvas (just a circle at hand position)
            if (raised) {
                ctx.shadowBlur = 20;
                ctx.shadowColor = 'rgba(126, 232, 250, 0.6)';
                ctx.fillStyle = 'rgba(126, 232, 250, 0.3)';
                ctx.beginPath();
                ctx.arc(handX, handY, 20, 0, 2 * Math.PI);
                ctx.fill();
                ctx.shadowBlur = 10;
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.beginPath();
                ctx.arc(handX, handY, 8, 0, 2 * Math.PI);
                ctx.fill();
                // Label
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.font = '14px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(side === 'left' ? '👈' : '👉', handX, handY - 30);
            }

            // Only process if game is active
            const isActive = (game.state === STATE.COUNTDOWN || game.state === STATE.WAITING);

            if (isActive && raised) {
                // Show glow on the side the hand is on
                if (side === 'left') {
                    leftCircle.classList.add('glow');
                    rightCircle.classList.remove('glow');
                } else {
                    rightCircle.classList.add('glow');
                    leftCircle.classList.remove('glow');
                }

                // Debounce trigger
                if (handRaisedStartTime === 0) {
                    handRaisedStartTime = performance.now();
                } else {
                    const elapsed = performance.now() - handRaisedStartTime;
                    if (elapsed > RAISE_DEBOUNCE_MS) {
                        if (!game.cooldown && !game.isProcessing && !game.handActive) {
                            if (game.state === STATE.COUNTDOWN) {
                                game.handActive = true;
                                soundSelect();
                                selectAnswer(side);
                            }
                        }
                    }
                }
            } else {
                // Not raised or not active - clear glow
                if (isActive) {
                    leftCircle.classList.remove('glow');
                    rightCircle.classList.remove('glow');
                }
                handRaisedStartTime = 0;
                if (!raised) {
                    game.handActive = false;
                }
            }
        }

        function setupHands() {
            const hands = new Hands({
                locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                }
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.65,
                minTrackingConfidence: 0.55,
            });

            hands.onResults(onHandResults);

            const camera = new Camera(video, {
                onFrame: async () => {
                    try {
                        await hands.send({ image: video });
                    } catch (_) { /* ignore */ }
                },
                width: 640,
                height: 480,
                facingMode: 'user',
            });

            return camera;
        }

        let cameraInstance = null;
        let cameraStarted = false;

        function startCameraAndGame() {
            if (cameraStarted) return;
            cameraStarted = true;
            cameraOverlay.classList.add('hidden');
            setStatus('✋ Wave your hand left or right!', true);
            resizeCanvas();
            cameraInstance = setupHands();
            cameraInstance.start().then(() => {
                handDetectionReady = true;
                initGame('foods');
                // Start the first question countdown (which is immediate)
                setTimeout(() => {
                    if (game.state === STATE.WAITING) {
                        game.state = STATE.COUNTDOWN;
                        setStatus('✋ Wave your hand now!', true);
                    }
                }, 600);
            }).catch((err) => {
                console.warn('Camera error:', err);
                questionEl.textContent = '📷 Camera access denied. Please allow camera and refresh.';
                setStatus('📷 Camera required', true);
                cameraOverlay.classList.remove('hidden');
                cameraStarted = false;
            });
        }

        cameraStartBtn.addEventListener('click', startCameraAndGame);
        cameraOverlay.addEventListener('click', (e) => {
            if (e.target === cameraOverlay || e.target.closest('#camera-overlay')) {
                startCameraAndGame();
            }
        });

        // ═══════════════════════════════════════════════════════════════
        //  RESTART
        // ═══════════════════════════════════════════════════════════════
        restartBtn.addEventListener('click', () => {
            stopConfetti();
            gameOverEl.classList.remove('show');
            gameOverEl.style.display = 'none';
            initGame(game.currentTopic);
            setTimeout(() => {
                if (game.state === STATE.WAITING) {
                    game.state = STATE.COUNTDOWN;
                    setStatus('✋ Wave your hand now!', true);
                }
            }, 400);
        });

        // ═══════════════════════════════════════════════════════════════
        //  KEYBOARD SHORTCUTS (for testing)
        // ═══════════════════════════════════════════════════════════════
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                if (game.state === STATE.COUNTDOWN || game.state === STATE.WAITING) {
                    selectAnswer('left');
                }
            } else if (e.key === 'ArrowRight') {
                if (game.state === STATE.COUNTDOWN || game.state === STATE.WAITING) {
                    selectAnswer('right');
                }
            } else if (e.key === 'r' || e.key === 'R') {
                restartBtn.click();
            }
        });

        // ═══════════════════════════════════════════════════════════════
        //  BOOT
        // ═══════════════════════════════════════════════════════════════
        questionEl.textContent = '🎯 Pick a topic and wave!';
        setStatus('📷 Allow camera to start', false);
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        cameraOverlay.classList.remove('hidden');

        console.log('🌈 Fun Hand Game loaded!');
        console.log('👋 Wave your hand left or right to answer! No timer!');
        console.log('🎮 Keyboard: Left/Right arrows to test, R to restart');
    </script>
