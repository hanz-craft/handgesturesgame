<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>✋ Gesture Classroom Game</title>

    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3/drawing_utils.js" crossorigin="anonymous">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js" crossorigin="anonymous">
    </script>

    <style>
        /* ─── RESET & BASE ─── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0b0e14;
            color: #fff;
            user-select: none;
        }

        /* ─── GAME CONTAINER ─── */
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #0b0e14;
        }

        /* ─── WEBCAM FEED ─── */
        #webcam {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 0;
            filter: brightness(0.6) saturate(1.1) contrast(1.05);
        }

        /* ─── OVERLAY ─── */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px 30px 30px;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }

        /* ─── HEADER (question + timer) ─── */
        #header {
            width: 100%;
            max-width: 900px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            padding: 16px 28px;
            background: rgba(10, 14, 23, 0.75);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            margin-top: 10px;
            flex-shrink: 0;
        }
        #question-text {
            font-size: clamp(1.1rem, 3.2vw, 2.2rem);
            font-weight: 700;
            line-height: 1.3;
            flex: 1;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
            letter-spacing: 0.01em;
            color: #f0f4ff;
        }
        #timer-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            background: rgba(0, 0, 0, 0.4);
            padding: 4px 18px 4px 14px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #timer-icon {
            font-size: 1.4rem;
        }
        #timer {
            font-size: clamp(2.2rem, 4vw, 3.4rem);
            font-weight: 800;
            color: #7ee8fa;
            min-width: 50px;
            text-align: center;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 20px rgba(126, 232, 250, 0.3);
            transition: color 0.2s;
        }
        #timer.warning {
            color: #ffb347;
            animation: pulse 0.5s ease-in-out infinite alternate;
        }
        #timer.danger {
            color: #ff4757;
            animation: pulse 0.3s ease-in-out infinite alternate;
        }
        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(1.08);
                opacity: 0.7;
            }
        }

        /* ─── ANSWERS ROW ─── */
        #answers-row {
            width: 100%;
            max-width: 1000px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            gap: 20px;
            min-height: 0;
        }
        .answer-circle {
            width: clamp(150px, 28vw, 280px);
            height: clamp(150px, 28vw, 280px);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: clamp(2.2rem, 5vw, 4.2rem);
            font-weight: 800;
            color: #fff;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5), inset 0 -4px 0 rgba(0, 0, 0, 0.2);
            transition: transform 0.15s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            cursor: default;
            position: relative;
            border: 4px solid rgba(255, 255, 255, 0.15);
            flex-shrink: 0;
            background: rgba(20, 30, 50, 0.7);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .answer-circle .label {
            font-size: clamp(0.7rem, 1.2vw, 1rem);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            opacity: 0.7;
            margin-top: 4px;
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.5);
        }
        .answer-circle .answer-text {
            line-height: 1.2;
            text-align: center;
            padding: 0 8px;
        }

        /* Left answer – cyan/blue */
        #left-answer {
            background: radial-gradient(ellipse at 30% 30%, rgba(0, 200, 255, 0.35), rgba(0, 80, 160, 0.6));
            border-color: rgba(0, 200, 255, 0.3);
        }
        #left-answer .label {
            color: #7ee8fa;
        }

        /* Right answer – pink/magenta */
        #right-answer {
            background: radial-gradient(ellipse at 30% 30%, rgba(255, 80, 180, 0.35), rgba(180, 20, 120, 0.6));
            border-color: rgba(255, 80, 180, 0.3);
        }
        #right-answer .label {
            color: #ff8ec4;
        }

        /* Hover/glow states */
        .answer-circle.glow-left {
            border-color: #7ee8fa;
            box-shadow: 0 0 40px rgba(0, 200, 255, 0.5), 0 12px 40px rgba(0, 0, 0, 0.5);
            transform: scale(1.04);
        }
        .answer-circle.glow-right {
            border-color: #ff8ec4;
            box-shadow: 0 0 40px rgba(255, 80, 180, 0.5), 0 12px 40px rgba(0, 0, 0, 0.5);
            transform: scale(1.04);
        }

        /* Correct / wrong states */
        .answer-circle.correct {
            border-color: #2ecc71 !important;
            box-shadow: 0 0 60px rgba(46, 204, 113, 0.6), 0 12px 40px rgba(0, 0, 0, 0.5) !important;
            background: radial-gradient(ellipse at 30% 30%, rgba(46, 204, 113, 0.5), rgba(20, 120, 60, 0.7)) !important;
            transform: scale(1.08);
        }
        .answer-circle.wrong {
            border-color: #e74c3c !important;
            box-shadow: 0 0 60px rgba(231, 76, 60, 0.6), 0 12px 40px rgba(0, 0, 0, 0.5) !important;
            background: radial-gradient(ellipse at 30% 30%, rgba(231, 76, 60, 0.5), rgba(140, 20, 20, 0.7)) !important;
            transform: scale(0.92);
        }
        .answer-circle.disabled {
            opacity: 0.5;
            transform: scale(0.95);
            filter: grayscale(0.4);
        }

        /* ─── FOOTER (score + progress) ─── */
        #footer {
            width: 100%;
            max-width: 900px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: rgba(10, 14, 23, 0.7);
            border-radius: 16px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
            margin-bottom: 4px;
        }
        #score-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: clamp(1rem, 1.8vw, 1.5rem);
            font-weight: 600;
        }
        #score-icon {
            font-size: 1.6rem;
        }
        #score-value {
            color: #f7d44a;
            font-weight: 800;
            font-size: clamp(1.4rem, 2.2vw, 2rem);
            min-width: 40px;
            text-align: center;
            transition: transform 0.15s;
        }
        #score-value.pop {
            animation: scorePop 0.3s ease;
        }
        @keyframes scorePop {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.6);
                color: #ffd700;
            }
            100% {
                transform: scale(1);
            }
        }

        #progress {
            font-size: clamp(0.85rem, 1.4vw, 1.2rem);
            font-weight: 500;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.04em;
        }
        #progress strong {
            color: #fff;
            font-weight: 700;
        }

        /* ─── CONFETTI CANVAS ─── */
        #confetti-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: none;
        }
        #confetti-canvas.active {
            display: block;
        }

        /* ─── GAME OVER OVERLAY ─── */
        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 30px;
        }
        #game-over.show {
            display: flex;
        }
        #game-over h1 {
            font-size: clamp(2.8rem, 6vw, 5rem);
            font-weight: 800;
            background: linear-gradient(135deg, #f7d44a, #ff8ec4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            text-shadow: 0 4px 30px rgba(247, 212, 74, 0.2);
        }
        #game-over .sub {
            font-size: clamp(1.2rem, 2vw, 1.8rem);
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 8px;
        }
        #game-over .final-score {
            font-size: clamp(3rem, 6vw, 5rem);
            font-weight: 800;
            color: #f7d44a;
            margin: 8px 0 20px;
            text-shadow: 0 0 40px rgba(247, 212, 74, 0.2);
        }
        #game-over .stats {
            font-size: clamp(1rem, 1.4vw, 1.3rem);
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 24px;
        }
        #restart-btn {
            padding: 14px 48px;
            font-size: clamp(1.1rem, 1.6vw, 1.4rem);
            font-weight: 700;
            border: none;
            border-radius: 60px;
            background: linear-gradient(135deg, #7ee8fa, #4a9eff);
            color: #fff;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(74, 158, 255, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        #restart-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 12px 40px rgba(74, 158, 255, 0.5);
        }
        #restart-btn:active {
            transform: scale(0.96);
        }

        /* ─── STATUS BADGE ─── */
        #status-badge {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            padding: 6px 24px;
            border-radius: 60px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            font-size: clamp(0.75rem, 1.2vw, 1rem);
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.06em;
            border: 1px solid rgba(255, 255, 255, 0.06);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s;
        }
        #status-badge.show {
            opacity: 1;
        }
        #status-badge .emoji {
            margin-right: 8px;
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 700px) {
            #header {
                padding: 12px 16px;
                border-radius: 14px;
                margin-top: 4px;
            }
            .answer-circle {
                width: clamp(110px, 32vw, 180px);
                height: clamp(110px, 32vw, 180px);
                font-size: clamp(1.6rem, 5vw, 2.8rem);
            }
            .answer-circle .label {
                font-size: 0.6rem;
            }
            #footer {
                padding: 10px 14px;
                border-radius: 12px;
            }
            #overlay {
                padding: 12px 14px 16px;
            }
        }
        @media (max-width: 450px) {
            .answer-circle {
                width: clamp(80px, 30vw, 130px);
                height: clamp(80px, 30vw, 130px);
                font-size: clamp(1.2rem, 4.5vw, 2rem);
            }
            .answer-circle .label {
                font-size: 0.5rem;
            }
            #header {
                padding: 8px 12px;
                gap: 10px;
            }
            #timer {
                font-size: 1.8rem;
                min-width: 34px;
            }
            #question-text {
                font-size: 0.9rem;
            }
            #timer-wrap {
                padding: 2px 10px 2px 8px;
            }
        }

        /* ─── UTILITY ─── */
        .hidden {
            display: none !important;
        }
        .fade-in {
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(8px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div id="game-container">

        <!-- WEBCAM -->
        <video id="webcam" autoplay playsinline></video>

        <!-- STATUS BADGE -->
        <div id="status-badge"><span class="emoji">✋</span> Raise your hand to answer</div>

        <!-- MAIN OVERLAY -->
        <div id="overlay">
            <!-- Header -->
            <div id="header">
                <div id="question-text">🎯 Get ready…</div>
                <div id="timer-wrap">
                    <span id="timer-icon">⏱️</span>
                    <span id="timer">10</span>
                </div>
            </div>

            <!-- Answers -->
            <div id="answers-row">
                <div id="left-answer" class="answer-circle" data-side="left">
                    <span class="answer-text">—</span>
                    <span class="label">⬅ Left</span>
                </div>
                <div id="right-answer" class="answer-circle" data-side="right">
                    <span class="answer-text">—</span>
                    <span class="label">Right ➡</span>
                </div>
            </div>

            <!-- Footer -->
            <div id="footer">
                <div id="score-wrap">
                    <span id="score-icon">⭐</span>
                    <span>Score:</span>
                    <span id="score-value">0</span>
                </div>
                <div id="progress">Question <strong id="q-num">0</strong> / <strong id="q-total">10</strong></div>
            </div>
        </div>

        <!-- CONFETTI CANVAS -->
        <canvas id="confetti-canvas"></canvas>

        <!-- GAME OVER -->
        <div id="game-over">
            <h1>🏆 Game Over!</h1>
            <div class="sub">You completed all questions</div>
            <div class="final-score" id="final-score">0</div>
            <div class="stats" id="final-stats">Correct: 0 &nbsp;·&nbsp; Wrong: 0</div>
            <button id="restart-btn">🔄 Play Again</button>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════
        //  QUESTIONS (embedded "JSON")
        // ═══════════════════════════════════════════════════════════
        const QUESTION_BANK = [{
            q: 'What is the chemical symbol for water?',
            left: 'H₂O',
            right: 'CO₂',
            correct: 'left'
        }, {
            q: 'Which planet is known as the Red Planet?',
            left: 'Venus',
            right: 'Mars',
            correct: 'right'
        }, {
            q: 'What is 7 × 8 ?',
            left: '48',
            right: '56',
            correct: 'right'
        }, {
            q: 'What is the capital of France?',
            left: 'London',
            right: 'Paris',
            correct: 'right'
        }, {
            q: 'What is the largest ocean on Earth?',
            left: 'Atlantic',
            right: 'Pacific',
            correct: 'right'
        }, {
            q: 'What is the square root of 144?',
            left: '10',
            right: '12',
            correct: 'right'
        }, {
            q: 'Which animal is the fastest on land?',
            left: 'Lion',
            right: 'Cheetah',
            correct: 'right'
        }, {
            q: 'What is the freezing point of water in °C?',
            left: '0°C',
            right: '32°C',
            correct: 'left'
        }, {
            q: 'Who painted the Mona Lisa?',
            left: 'Michelangelo',
            right: 'Da Vinci',
            correct: 'right'
        }, {
            q: 'What is the smallest prime number?',
            left: '0',
            right: '2',
            correct: 'right'
        }, {
            q: 'How many continents are there?',
            left: '5',
            right: '7',
            correct: 'right'
        }, {
            q: 'What is the speed of light approx. (km/s)?',
            left: '300,000',
            right: '150,000',
            correct: 'left'
        }, {
            q: 'Which element is needed for combustion?',
            left: 'Nitrogen',
            right: 'Oxygen',
            correct: 'right'
        }, {
            q: 'What is 15 + 27 ?',
            left: '42',
            right: '52',
            correct: 'left'
        }, {
            q: 'Which country has the most population?',
            left: 'India',
            right: 'China',
            correct: 'left'
        }];

        // ═══════════════════════════════════════════════════════════
        //  GAME STATE
        // ═══════════════════════════════════════════════════════════
        const STATE = {
            WAITING: 'waiting',
            COUNTDOWN: 'countdown',
            ANSWERED: 'answered',
            GAME_OVER: 'game_over'
        };

        let game = {
            questions: [],
            currentIndex: 0,
            score: 0,
            correctCount: 0,
            wrongCount: 0,
            state: STATE.WAITING,
            timer: 10,
            timerInterval: null,
            cooldown: false,
            handActive: false,
            selectedSide: null, // 'left' or 'right'
            totalQuestions: 10,
            isProcessing: false,
        };

        // DOM refs
        const video = document.getElementById('webcam');
        const questionEl = document.getElementById('question-text');
        const timerEl = document.getElementById('timer');
        const leftCircle = document.getElementById('left-answer');
        const rightCircle = document.getElementById('right-answer');
        const scoreEl = document.getElementById('score-value');
        const qNumEl = document.getElementById('q-num');
        const qTotalEl = document.getElementById('q-total');
        const statusBadge = document.getElementById('status-badge');
        const confettiCanvas = document.getElementById('confetti-canvas');
        const gameOverEl = document.getElementById('game-over');
        const finalScoreEl = document.getElementById('final-score');
        const finalStatsEl = document.getElementById('final-stats');
        const restartBtn = document.getElementById('restart-btn');

        // ═══════════════════════════════════════════════════════════
        //  SOUND ENGINE (Web Audio)
        // ═══════════════════════════════════════════════════════════
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new(window.AudioContext || window.webkitAudioContext)();
        }

        function playTone(freq, duration, type = 'sine', vol = 0.25) {
            try {
                initAudio();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch (_) { /* silent fail */ }
        }

        function soundTick() { playTone(800, 0.08, 'sine', 0.15); }

        function soundCorrect() {
            playTone(523, 0.15, 'sine', 0.2);
            setTimeout(() => playTone(659, 0.15, 'sine', 0.2), 120);
            setTimeout(() => playTone(784, 0.25, 'sine', 0.25), 240);
        }

        function soundWrong() {
            playTone(300, 0.3, 'sawtooth', 0.15);
            setTimeout(() => playTone(200, 0.4, 'sawtooth', 0.12), 150);
        }

        function soundGameOver() {
            [523, 587, 659, 784].forEach((f, i) => {
                setTimeout(() => playTone(f, 0.2, 'sine', 0.18), i * 150);
            });
        }

        function soundCountdown() {
            playTone(600, 0.06, 'sine', 0.12);
        }

        // ═══════════════════════════════════════════════════════════
        //  CONFETTI
        // ═══════════════════════════════════════════════════════════
        let confettiPieces = [];
        let confettiAnimId = null;
        let confettiRunning = false;

        function initConfettiCanvas() {
            const canvas = confettiCanvas;
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            canvas.style.display = 'block';
            canvas.classList.add('active');
        }

        function resizeConfetti() {
            const canvas = confettiCanvas;
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeConfetti);

        function launchConfetti(count = 180) {
            initConfettiCanvas();
            const canvas = confettiCanvas;
            const ctx = canvas.getContext('2d');
            const w = canvas.width,
                h = canvas.height;

            const colors = ['#f7d44a', '#ff8ec4', '#7ee8fa', '#4a9eff', '#2ecc71', '#ff6b6b', '#a29bfe', '#fd79a8', '#00b894',
                '#fdcb6e'
            ];

            for (let i = 0; i < count; i++) {
                confettiPieces.push({
                    x: w / 2 + (Math.random() - 0.5) * 200,
                    y: h / 2 - 100 + (Math.random() - 0.5) * 80,
                    w: 8 + Math.random() * 10,
                    h: 4 + Math.random() * 6,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    vx: (Math.random() - 0.5) * 14,
                    vy: -6 - Math.random() * 10,
                    rot: Math.random() * 6.28,
                    rotSpeed: (Math.random() - 0.5) * 0.2,
                    gravity: 0.12 + Math.random() * 0.08,
                    life: 1,
                    decay: 0.006 + Math.random() * 0.008,
                });
            }

            if (confettiRunning) return;
            confettiRunning = true;
            confettiAnimId = requestAnimationFrame(renderConfetti);
        }

        function renderConfetti() {
            const canvas = confettiCanvas;
            const ctx = canvas.getContext('2d');
            const w = canvas.width,
                h = canvas.height;
            ctx.clearRect(0, 0, w, h);

            let alive = false;
            for (const p of confettiPieces) {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += p.gravity;
                p.rot += p.rotSpeed;
                p.life -= p.decay;
                if (p.life <= 0) continue;
                alive = true;
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rot);
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 6;
                ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                ctx.restore();
            }

            if (alive) {
                confettiAnimId = requestAnimationFrame(renderConfetti);
            } else {
                confettiRunning = false;
                confettiPieces = [];
                canvas.style.display = 'none';
                canvas.classList.remove('active');
                if (confettiAnimId) {
                    cancelAnimationFrame(confettiAnimId);
                    confettiAnimId = null;
                }
            }
        }

        function stopConfetti() {
            confettiPieces = [];
            if (confettiAnimId) {
                cancelAnimationFrame(confettiAnimId);
                confettiAnimId = null;
            }
            confettiRunning = false;
            confettiCanvas.style.display = 'none';
            confettiCanvas.classList.remove('active');
        }

        // ═══════════════════════════════════════════════════════════
        //  GAME LOGIC
        // ═══════════════════════════════════════════════════════════
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function initGame() {
            const shuffled = shuffleArray([...QUESTION_BANK]);
            game.questions = shuffled.slice(0, Math.min(game.totalQuestions, shuffled.length));
            game.currentIndex = 0;
            game.score = 0;
            game.correctCount = 0;
            game.wrongCount = 0;
            game.state = STATE.WAITING;
            game.timer = 10;
            game.cooldown = false;
            game.handActive = false;
            game.selectedSide = null;
            game.isProcessing = false;

            qTotalEl.textContent = game.questions.length;
            game.totalQuestions = game.questions.length;
            updateScore();
            gameOverEl.classList.remove('show');
            gameOverEl.style.display = 'none';
            stopConfetti();
            clearTimer();

            showQuestion();
            setStatus('✋ Raise your hand to start!', true);
        }

        function showQuestion() {
            if (game.currentIndex >= game.questions.length) {
                endGame();
                return;
            }
            const q = game.questions[game.currentIndex];
            questionEl.textContent = q.q;
            leftCircle.querySelector('.answer-text').textContent = q.left;
            rightCircle.querySelector('.answer-text').textContent = q.right;
            qNumEl.textContent = game.currentIndex + 1;

            // Reset circles
            leftCircle.className = 'answer-circle';
            rightCircle.className = 'answer-circle';
            leftCircle.dataset.side = 'left';
            rightCircle.dataset.side = 'right';

            game.state = STATE.WAITING;
            game.timer = 10;
            timerEl.textContent = '10';
            timerEl.className = '';
            game.cooldown = false;
            game.handActive = false;
            game.selectedSide = null;
            game.isProcessing = false;

            setStatus('✋ Raise your hand to start!', true);
        }

        function startCountdown() {
            if (game.state === STATE.ANSWERED || game.state === STATE.GAME_OVER) return;
            if (game.currentIndex >= game.questions.length) return;

            game.state = STATE.COUNTDOWN;
            game.timer = 10;
            timerEl.textContent = '10';
            timerEl.className = '';
            game.cooldown = false;
            game.handActive = false;
            game.selectedSide = null;
            game.isProcessing = false;

            leftCircle.className = 'answer-circle';
            rightCircle.className = 'answer-circle';

            setStatus('⏱️ Answer quickly!', true);
            soundCountdown();

            clearTimer();
            game.timerInterval = setInterval(() => {
                game.timer -= 1;
                timerEl.textContent = game.timer;
                if (game.timer <= 5) {
                    timerEl.className = game.timer <= 3 ? 'danger' : 'warning';
                }
                soundTick();

                if (game.timer <= 0) {
                    clearTimer();
                    // Time's up – mark as wrong
                    if (game.state === STATE.COUNTDOWN) {
                        handleTimeout();
                    }
                }
            }, 1000);
        }

        function handleTimeout() {
            if (game.state !== STATE.COUNTDOWN) return;
            game.state = STATE.ANSWERED;
            game.wrongCount++;
            setStatus('⏰ Time\'s up!', true);
            soundWrong();
            // Show both circles as disabled / wrong
            leftCircle.classList.add('disabled');
            rightCircle.classList.add('disabled');
            setTimeout(() => nextQuestion(), 1200);
        }

        function selectAnswer(side) {
            if (game.state !== STATE.COUNTDOWN) return;
            if (game.cooldown || game.isProcessing) return;
            if (game.currentIndex >= game.questions.length) return;
            const q = game.questions[game.currentIndex];
            const isCorrect = (side === q.correct);

            game.state = STATE.ANSWERED;
            game.cooldown = true;
            game.isProcessing = true;
            game.selectedSide = side;
            clearTimer();

            // Highlight selected
            const el = side === 'left' ? leftCircle : rightCircle;
            const other = side === 'left' ? rightCircle : leftCircle;

            if (isCorrect) {
                el.classList.add('correct');
                other.classList.add('disabled');
                game.score++;
                game.correctCount++;
                updateScore(true);
                soundCorrect();
                launchConfetti(160);
                setStatus('✅ Correct! 🎉', true);
            } else {
                el.classList.add('wrong');
                // Also highlight the correct answer
                const correctEl = q.correct === 'left' ? leftCircle : rightCircle;
                correctEl.classList.add('correct');
                other.classList.add('disabled');
                game.wrongCount++;
                soundWrong();
                setStatus('❌ Wrong!', true);
            }

            setTimeout(() => {
                game.isProcessing = false;
                nextQuestion();
            }, 1500);
        }

        function nextQuestion() {
            game.cooldown = false;
            game.currentIndex++;
            if (game.currentIndex >= game.questions.length) {
                endGame();
            } else {
                showQuestion();
                // Auto-start next countdown after a short pause
                setTimeout(() => {
                    if (game.state === STATE.WAITING) {
                        startCountdown();
                    }
                }, 600);
            }
        }

        function endGame() {
            game.state = STATE.GAME_OVER;
            clearTimer();
            stopConfetti();
            setStatus('🏁 Game Over!', true);

            finalScoreEl.textContent = game.score;
            finalStatsEl.textContent = `Correct: ${game.correctCount}  ·  Wrong: ${game.wrongCount}`;
            gameOverEl.style.display = 'flex';
            setTimeout(() => gameOverEl.classList.add('show'), 50);
            soundGameOver();
            launchConfetti(220);
        }

        function updateScore(pop = false) {
            scoreEl.textContent = game.score;
            if (pop) {
                scoreEl.classList.remove('pop');
                void scoreEl.offsetWidth;
                scoreEl.classList.add('pop');
            }
        }

        function clearTimer() {
            if (game.timerInterval) {
                clearInterval(game.timerInterval);
                game.timerInterval = null;
            }
        }

        function setStatus(msg, show = true) {
            const badge = statusBadge;
            if (show) {
                badge.innerHTML = msg;
                badge.classList.add('show');
            } else {
                badge.classList.remove('show');
            }
        }

        // ═══════════════════════════════════════════════════════════
        //  MEDIAPIPE HAND DETECTION
        // ═══════════════════════════════════════════════════════════
        let handDetectionReady = false;

        function onHandResults(results) {
            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                // No hand detected – clear glow
                if (game.state === STATE.COUNTDOWN) {
                    leftCircle.classList.remove('glow-left');
                    rightCircle.classList.remove('glow-right');
                }
                return;
            }

            // Use the first hand
            const landmarks = results.multiHandLandmarks[0];
            const wrist = landmarks[0];
            const indexTip = landmarks[8];
            const middleTip = landmarks[12];
            const imageWidth = video.videoWidth || 640;
            const imageHeight = video.videoHeight || 480;

            // Mirror x for display
            const mirroredX = imageWidth - indexTip.x * imageWidth;
            const y = indexTip.y * imageHeight;

            // Check if hand is "raised": index tip above wrist (y smaller = higher)
            const raised = indexTip.y < wrist.y - 0.02;

            // Check side
            const half = imageWidth / 2;
            const side = mirroredX < half ? 'left' : 'right';

            // Update glow
            if (game.state === STATE.COUNTDOWN && raised) {
                if (side === 'left') {
                    leftCircle.classList.add('glow-left');
                    rightCircle.classList.remove('glow-right');
                } else {
                    rightCircle.classList.add('glow-right');
                    leftCircle.classList.remove('glow-left');
                }

                // Trigger selection if hand is raised and we're in countdown
                if (raised && !game.cooldown && !game.isProcessing) {
                    // Debounce: only trigger if hand was not active before
                    if (!game.handActive) {
                        game.handActive = true;
                        selectAnswer(side);
                    }
                }
            } else {
                leftCircle.classList.remove('glow-left');
                rightCircle.classList.remove('glow-right');
                if (!raised) {
                    game.handActive = false;
                }
            }

            // If hand is not raised, reset active flag
            if (!raised) {
                game.handActive = false;
            }
        }

        function setupHandDetection() {
            const hands = new Hands({
                locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                }
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.6,
            });

            hands.onResults(onHandResults);

            const camera = new Camera(video, {
                onFrame: async () => {
                    try {
                        await hands.send({ image: video });
                    } catch (_) { /* ignore frame errors */ }
                },
                width: 640,
                height: 480,
                facingMode: 'user',
            });

            camera.start().then(() => {
                handDetectionReady = true;
                // Start the game once camera is ready
                initGame();
                // Auto-start first question after a moment
                setTimeout(() => {
                    if (game.state === STATE.WAITING) {
                        startCountdown();
                    }
                }, 800);
            }).catch((err) => {
                console.warn('Camera error:', err);
                // Fallback: show message and let user click to start
                questionEl.textContent = '📷 Please allow camera access and refresh.';
                setStatus('📷 Camera required', true);
            });
        }

        // ═══════════════════════════════════════════════════════════
        //  RESTART
        // ═══════════════════════════════════════════════════════════
        restartBtn.addEventListener('click', () => {
            stopConfetti();
            gameOverEl.classList.remove('show');
            gameOverEl.style.display = 'none';
            initGame();
            setTimeout(() => {
                if (game.state === STATE.WAITING) {
                    startCountdown();
                }
            }, 600);
        });

        // ═══════════════════════════════════════════════════════════
        //  KEYBOARD SHORTCUTS (for testing without webcam)
        // ═══════════════════════════════════════════════════════════
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                if (game.state === STATE.COUNTDOWN) selectAnswer('left');
            } else if (e.key === 'ArrowRight') {
                if (game.state === STATE.COUNTDOWN) selectAnswer('right');
            } else if (e.key === ' ' || e.key === 'Enter') {
                e.preventDefault();
                if (game.state === STATE.WAITING) startCountdown();
            } else if (e.key === 'r' || e.key === 'R') {
                restartBtn.click();
            }
        });

        // ═══════════════════════════════════════════════════════════
        //  BOOT
        // ═══════════════════════════════════════════════════════════
        // Set initial state
        questionEl.textContent = '🎯 Loading camera…';
        setStatus('📷 Starting camera…', true);

        // Handle resize for confetti
        window.addEventListener('resize', resizeConfetti);

        // Start MediaPipe
        setupHandDetection();

        // Fallback: if camera takes too long, show a manual start hint
        setTimeout(() => {
            if (game.state === STATE.WAITING && game.currentIndex === 0) {
                setStatus('✋ Raise your hand or press Space to start', true);
            }
        }, 3000);

        console.log('✋ Gesture Classroom Game loaded!');
        console.log('Controls: Left/Right arrow keys to test, Space to start, R to restart');
    </script>
</body>
</html>
